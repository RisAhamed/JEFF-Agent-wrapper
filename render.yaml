services:
  - type: web
    name: jeff-ai-agent-ts
    runtime: python
    region: oregon
    plan: free

    buildCommand: |
      pip install -r requirements.txt
      npm install

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health

    autoDeploy: true

    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
