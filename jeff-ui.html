<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeff — Your AI Co-Founder | JustStartUP</title>
    <meta name="description" content="Jeff AI Agent — multi-mode startup co-founder chat interface by JustStartUP">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rosario:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* ── Reset & Base ────────────────────────────────────────── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --surface-alt: #1a1a1a;
            --accent: #7c3aed;
            --accent-hover: #6d28d9;
            --text-primary: #e5e5e5;
            --text-muted: #888888;
            --border: rgba(255, 255, 255, 0.08);
            --radius-card: 12px;
            --radius-pill: 999px;
        }

        body {
            font-family: 'Rosario', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Close Button ─────────────────────────────────────────── */
        .close-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .close-btn:hover {
            background: rgba(255, 0, 0, 0.15);
            color: #ff4444;
            border-color: rgba(255, 0, 0, 0.3);
        }

        /* ── Close Overlay ────────────────────────────────────────── */
        .close-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            gap: 16px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .close-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .close-overlay h2 {
            font-size: 24px;
            color: var(--text-primary);
        }

        .close-overlay p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .close-overlay button {
            padding: 10px 24px;
            border-radius: var(--radius-pill);
            border: none;
            background: var(--accent);
            color: #fff;
            font-family: 'Rosario', sans-serif;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s ease;
        }

        .close-overlay button:hover {
            background: var(--accent-hover);
        }

        /* ── Header ──────────────────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            flex-shrink: 0;
            z-index: 10;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .header-brand .logo {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }

        .header-brand h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .header-brand .subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-left: 2px;
        }

        .mode-nav {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding: 4px 0;
            margin-left: auto;
        }

        .mode-nav::-webkit-scrollbar {
            display: none;
        }

        .mode-btn {
            padding: 8px 18px;
            border-radius: var(--radius-pill);
            border: 1px solid var(--border);
            background: var(--surface-alt);
            color: var(--text-muted);
            font-family: 'Rosario', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .mode-btn:hover {
            background: #222;
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .mode-btn.active {
            background: var(--accent);
            color: #ffffff;
            border-color: var(--accent);
        }

        .mode-btn.active:hover {
            background: var(--accent-hover);
        }

        /* ── Chat Area ───────────────────────────────────────────── */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
            transition: opacity 0.2s ease;
        }

        .chat-area.fade-out {
            opacity: 0;
        }

        .chat-area::-webkit-scrollbar {
            width: 6px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        /* ── Message Bubbles ─────────────────────────────────────── */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 680px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.jeff {
            align-self: flex-start;
        }

        .message.user {
            align-self: flex-end;
        }

        .message-label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .message.jeff .message-label {
            color: var(--accent);
        }

        .message.user .message-label {
            color: var(--text-muted);
            justify-content: flex-end;
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: var(--radius-card);
            font-size: 14px;
            line-height: 1.65;
            word-wrap: break-word;
        }

        .message.jeff .message-bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            color: var(--text-primary);
        }

        .message.user .message-bubble {
            background: var(--accent);
            color: #ffffff;
            border: none;
        }

        /* ── Rendered Markdown inside Jeff's bubbles ─────────────── */
        .message-bubble h1,
        .message-bubble h2,
        .message-bubble h3,
        .message-bubble h4 {
            color: var(--text-primary);
            margin: 12px 0 6px 0;
            line-height: 1.3;
        }
        .message-bubble h1 { font-size: 18px; }
        .message-bubble h2 { font-size: 16px; }
        .message-bubble h3 { font-size: 15px; }
        .message-bubble h4 { font-size: 14px; }
        .message-bubble h1:first-child,
        .message-bubble h2:first-child,
        .message-bubble h3:first-child {
            margin-top: 0;
        }

        .message-bubble p {
            margin: 8px 0;
        }
        .message-bubble p:first-child { margin-top: 0; }
        .message-bubble p:last-child { margin-bottom: 0; }

        .message-bubble strong {
            color: #ffffff;
            font-weight: 600;
        }

        .message-bubble em {
            color: var(--text-muted);
            font-style: italic;
        }

        .message-bubble ul,
        .message-bubble ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        .message-bubble li {
            margin: 4px 0;
        }

        .message-bubble code {
            background: rgba(124, 58, 237, 0.15);
            color: #c4b5fd;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .message-bubble pre {
            background: #0d0d0d;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
            overflow-x: auto;
        }

        .message-bubble pre code {
            background: none;
            padding: 0;
            color: #c4b5fd;
            font-size: 13px;
        }

        .message-bubble hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 12px 0;
        }

        .message-bubble table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 13px;
        }

        .message-bubble th,
        .message-bubble td {
            border: 1px solid var(--border);
            padding: 6px 10px;
            text-align: left;
        }

        .message-bubble th {
            background: rgba(124, 58, 237, 0.1);
            font-weight: 600;
        }

        .message-bubble blockquote {
            border-left: 3px solid var(--accent);
            margin: 8px 0;
            padding: 4px 12px;
            color: var(--text-muted);
        }

        .message-bubble a {
            color: #a78bfa;
            text-decoration: underline;
        }

        /* ── Typing Indicator ────────────────────────────────────── */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 14px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: var(--radius-card);
            max-width: 80px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typingPulse 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingPulse {
            0%, 60%, 100% { transform: scale(0.6); opacity: 0.4; }
            30% { transform: scale(1); opacity: 1; }
        }

        /* ── Input Bar ───────────────────────────────────────────── */
        .input-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            background: var(--bg);
            flex-shrink: 0;
        }

        .input-field {
            flex: 1;
            padding: 14px 18px;
            border-radius: var(--radius-card);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
        }

        .input-field:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-card);
            border: none;
            background: var(--accent);
            color: #ffffff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ── Responsive ──────────────────────────────────────────── */
        @media (max-width: 640px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                padding: 12px 16px;
            }

            .mode-nav {
                margin-left: 0;
                width: 100%;
            }

            .chat-area {
                padding: 16px;
            }

            .input-bar {
                padding: 12px 16px;
            }

            .message {
                max-width: 90%;
            }

            .header-brand .subtitle {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- ── Header ──────────────────────────────────────────────── -->
    <header class="header" id="header">
        <div class="header-brand">
            <div class="logo">◈</div>
            <div>
                <h1>Jeff</h1>
                <span class="subtitle">Your AI Co-Founder</span>
            </div>
        </div>
        <nav class="mode-nav" id="modeNav">
            <button class="mode-btn active" data-mode="investor" id="mode-investor">Investor</button>
            <button class="mode-btn" data-mode="business_model" id="mode-business_model">Business Model</button>
            <button class="mode-btn" data-mode="customer" id="mode-customer">Customer</button>
            <button class="mode-btn" data-mode="pitch_deck" id="mode-pitch_deck">Pitch Deck</button>
            <button class="mode-btn" data-mode="financial" id="mode-financial">Financial</button>
        </nav>
        <button class="close-btn" id="closeBtn" title="Close (ESC)">✕</button>
    </header>

    <!-- ── Close Overlay ───────────────────────────────────────── -->
    <div class="close-overlay" id="closeOverlay">
        <h2>Session Ended</h2>
        <p>Thanks for chatting with Jeff. Your conversation has been cleared.</p>
        <button id="reopenBtn">Reopen Jeff</button>
    </div>

    <!-- ── Chat Area ───────────────────────────────────────────── -->
    <main class="chat-area" id="chatArea"></main>

    <!-- ── Input Bar ───────────────────────────────────────────── -->
    <footer class="input-bar" id="inputBar">
        <input
            type="text"
            class="input-field"
            id="inputField"
            placeholder="Ask Jeff anything about your startup..."
            autocomplete="off"
        >
        <button class="send-btn" id="sendBtn" title="Send message">→</button>
    </footer>

    <script>
        // ── Configuration ────────────────────────────────────────────────────
        // Auto-detect backend URL. If running locally on port 8080 (python -m http.server),
        // it falls back to the FastAPI localhost port 8000.
        // Otherwise, it uses the current domain (e.g., the Render deployment URL).
        const API_BASE_URL = window.location.hostname === 'localhost' && window.location.port === '8080'
            ? 'http://localhost:8000'
            : window.location.origin;
        let useBackend = true; // Attempt real backend; auto-fallback to mock on failure

        // ── State ────────────────────────────────────────────────────────────
        let currentMode = 'investor';
        let isStreaming = false;

        // Per-mode session IDs — each mode has its own LangChain memory on the server.
        // Switching modes preserves each mode's conversation independently.
        const modeSessions = {
            investor:       crypto.randomUUID(),
            business_model: crypto.randomUUID(),
            customer:       crypto.randomUUID(),
            pitch_deck:     crypto.randomUUID(),
            financial:      crypto.randomUUID()
        };

        // Per-mode chat UI cache — stores the innerHTML of chatArea per mode
        // so switching back restores the exact conversation visually.
        const modeChatCache = {
            investor:       null,
            business_model: null,
            customer:       null,
            pitch_deck:     null,
            financial:      null
        };

        // Active session_id — points to current mode's session
        let sessionId = modeSessions[currentMode];

        // ── DOM References ───────────────────────────────────────────────────
        const chatArea     = document.getElementById('chatArea');
        const inputField   = document.getElementById('inputField');
        const sendBtn      = document.getElementById('sendBtn');
        const modeButtons  = document.querySelectorAll('.mode-btn');
        const closeBtn     = document.getElementById('closeBtn');
        const closeOverlay = document.getElementById('closeOverlay');
        const reopenBtn    = document.getElementById('reopenBtn');

        // ── Welcome Messages (per mode) ─────────────────────────────────────
        const welcomeMessages = {
            investor:       "Hi, I'm Jeff. Let's build your investor story. What stage are you at, and who are you trying to reach?",
            business_model: "Hi, I'm Jeff. Let's design your business model. Tell me what you're building and who pays for it.",
            customer:       "Hi, I'm Jeff. Let's get inside your customer's head. Who is the person whose life you're trying to make better?",
            pitch_deck:     "Hi, I'm Jeff. Let's build your pitch deck. What's your one-line company description?",
            financial:      "Hi, I'm Jeff. Let's run the numbers. What's your current MRR, burn rate, or the financial question on your mind?"
        };

        // ── Mock Responses (fallback when backend is unavailable) ────────────
        function getMockResponse(mode, message) {
            const responses = {
                investor: `Great question. When approaching investor meetings, especially at the early stage, you need to lead with the narrative, not the numbers. Investors at pre-seed and seed are buying into you and your vision — traction is a bonus, not a prerequisite. Start by framing the problem as a burning pain point that a specific customer segment experiences daily. Then position your solution as the inevitable fix. If you have any early signals — waitlist sign-ups, LOIs, pilot customers, even strong survey data — weave those in as social proof. Consider whether a SAFE note or a priced round makes more sense for your stage. SAFEs are faster, cheaper, and founder-friendly, but some angels prefer priced rounds for clarity on ownership. One more thing: warm intros convert at 10x the rate of cold outreach. Map your network, find second-degree connections to target investors, and ask for specific, personal introductions. What's your current fundraising target, and have you identified your lead investor profile yet?`,

                business_model: `Let's break this down structurally. The first question I always ask founders is: who pays, how much, and how often? That tells me if you're building a transactional, subscription, or marketplace model — and each has wildly different unit economics. If you're going subscription (SaaS), your north star metrics are MRR, churn rate, and expansion revenue. A healthy SaaS business has net revenue retention above 110%, meaning existing customers grow faster than churning ones. If you're marketplace, you need to solve the chicken-and-egg problem first — which side do you subsidize to bootstrap liquidity? I'd also challenge you to think about your value proposition using the Jobs-to-be-Done framework: what job is your customer hiring your product to do, and what are they currently using as a workaround? That workaround is your real competitor, not the other startups in your space. Consider a land-and-expand strategy — start with a narrow, low-friction entry point, then upsell as you prove value. What's your current pricing model, and have you tested willingness to pay with real customers?`,

                customer: `Let's get specific — "small businesses" is not a customer segment, it's a census category. I need you to describe one real person. Give me their age, role, daily frustrations, and the moment in their day when they feel the pain your product solves. For example: "A 34-year-old SaaS founder who spends 3 hours every Monday manually pulling data from five different tools to build a board report." That's a customer. Now I can work with that. The Jobs-to-be-Done framework helps here — your customer doesn't want your product, they want progress in their life. They're "hiring" your product to make that progress happen. What's the current workaround they use? That workaround tells you their budget (what they already pay, in time or money), their expectations, and your competitive positioning. Next step: run 10 discovery interviews. Don't pitch — just listen. Ask "Tell me about the last time you experienced [problem]" and let them talk. Record the exact words they use — that becomes your marketing copy. Who is the specific person you're building for?`,

                pitch_deck: `The most common mistake founders make is starting their pitch deck with the solution. That's backwards. Your Problem slide needs to make investors physically feel the pain before you reveal the cure. Think of it as a movie trailer — tension first, resolution second. Here's the proven sequence: Problem → Solution → Market Size → Business Model → Traction → Team → The Ask. Your Problem slide should tell a micro-story: one specific customer, one specific frustration, one specific failed workaround. Your Solution slide should feel like relief — "finally, someone fixed this." For Market Size, use the TAM-SAM-SOM framework, but ground it in bottoms-up math, not top-down Gartner reports. Investors see through "$50B market opportunity" claims — show them how you calculated your serviceable obtainable market from real numbers. Your Traction slide is where you earn credibility — even pre-revenue, show user growth curves, engagement metrics, pilot results, or waitlist numbers. Keep each slide to one key idea with minimal text. What's your one-line company description, and what problem are you solving?`,

                financial: `Let's talk real numbers. The three metrics every early-stage investor will ask about are: burn rate (how much cash you spend monthly), runway (how many months until you're out of cash), and CAC/LTV ratio. A healthy benchmark is LTV:CAC of 3:1 or better — meaning for every dollar you spend acquiring a customer, you earn at least three dollars over their lifetime. Here's the formula: LTV = ARPU × Gross Margin × Average Customer Lifespan. CAC = Total Sales & Marketing Spend / New Customers Acquired. If your LTV:CAC is below 3:1, you either need to reduce acquisition costs (organic channels, referrals, content marketing) or increase customer value (upsells, reduced churn, price optimization). For runway, the golden rule is: raise enough to last 18 months. That gives you 12 months to hit milestones and 6 months to fundraise. If your monthly burn is $30K, you need $540K minimum. What's your current monthly burn rate, and what are your primary cost drivers — engineering, marketing, or operations?`
            };

            return responses[mode] || responses['investor'];
        }

        // ── Message Rendering ───────────────────────────────────────────────

        function addJeffMessage(text) {
            const msg = document.createElement('div');
            msg.className = 'message jeff';
            msg.innerHTML = `
                <div class="message-label">◈ Jeff</div>
                <div class="message-bubble">${renderMarkdown(text)}</div>
            `;
            chatArea.appendChild(msg);
            scrollToBottom();
            return msg;
        }

        function addUserMessage(text) {
            const msg = document.createElement('div');
            msg.className = 'message user';
            msg.innerHTML = `
                <div class="message-label">You</div>
                <div class="message-bubble">${escapeHTML(text)}</div>
            `;
            chatArea.appendChild(msg);
            scrollToBottom();
        }

        function showTypingIndicator() {
            const msg = document.createElement('div');
            msg.className = 'message jeff';
            msg.id = 'typingIndicator';
            msg.innerHTML = `
                <div class="message-label">◈ Jeff</div>
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            chatArea.appendChild(msg);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ── Markdown Renderer ───────────────────────────────────────────────
        // Uses marked.js to convert Markdown to formatted HTML.
        // Called after streaming completes to render the final response.

        function renderMarkdown(text) {
            if (typeof marked !== 'undefined') {
                marked.setOptions({ breaks: true, gfm: true });
                return marked.parse(text);
            }
            // Fallback: return escaped HTML if marked.js not loaded
            return escapeHTML(text);
        }

        // ── Backend Streaming (real Groq API via FastAPI) ────────────────────

        async function streamFromBackend(mode, message, bubble) {
            try {
                const response = await fetch(`${API_BASE_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        mode: mode,
                        session_id: sessionId  // Server-side LangChain memory
                    })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                // Capture session_id from server (in case server generated one)
                const serverSessionId = response.headers.get('X-Session-Id');
                if (serverSessionId) sessionId = serverSessionId;

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    fullResponse += chunk;
                    bubble.textContent = fullResponse; // Raw text during streaming
                    scrollToBottom();
                }

                // Render final Markdown after streaming completes
                bubble.innerHTML = renderMarkdown(fullResponse);

                // Memory is saved server-side by LangChain — no client tracking needed
                return true;
            } catch (err) {
                console.warn('Backend unavailable, falling back to mock:', err.message);
                return false;
            }
        }

        // ── Mock Streaming (fallback) ───────────────────────────────────────

        function streamMockResponse(mode, message, bubble) {
            return new Promise((resolve) => {
                const responseText = getMockResponse(mode, message);
                const words = responseText.split(' ');
                let wordIndex = 0;

                const streamInterval = setInterval(() => {
                    if (wordIndex < words.length) {
                        bubble.textContent += (wordIndex === 0 ? '' : ' ') + words[wordIndex];
                        wordIndex++;
                        scrollToBottom();
                    } else {
                        clearInterval(streamInterval);
                        // Render final Markdown after mock streaming completes
                        bubble.innerHTML = renderMarkdown(responseText);
                        resolve();
                    }
                }, 50);
            });
        }

        // ── Unified Streaming Handler ───────────────────────────────────────

        async function streamResponse(mode, message) {
            isStreaming = true;
            inputField.disabled = true;
            sendBtn.disabled = true;

            showTypingIndicator();

            // Brief delay for typing indicator UX
            await new Promise(r => setTimeout(r, 800));
            removeTypingIndicator();

            // Create Jeff's bubble (empty, will fill with streamed content)
            const msg = document.createElement('div');
            msg.className = 'message jeff';
            msg.innerHTML = `
                <div class="message-label">◈ Jeff</div>
                <div class="message-bubble"></div>
            `;
            chatArea.appendChild(msg);
            const bubble = msg.querySelector('.message-bubble');

            // Try backend first, fallback to mock
            if (useBackend) {
                const success = await streamFromBackend(mode, message, bubble);
                if (!success) {
                    await streamMockResponse(mode, message, bubble);
                }
            } else {
                await streamMockResponse(mode, message, bubble);
            }

            isStreaming = false;
            inputField.disabled = false;
            sendBtn.disabled = false;
            inputField.focus();
        }

        // ── Send Message ────────────────────────────────────────────────────

        function sendMessage() {
            if (isStreaming) return;

            const message = inputField.value.trim();
            if (!message) return; // Empty state guard

            addUserMessage(message);
            inputField.value = '';
            streamResponse(currentMode, message);
        }

        // ── Mode Switching ──────────────────────────────────────────────────
        // Each mode preserves its own conversation. Switching saves the current
        // mode's chat UI and restores the target mode's cached chat.
        // Server-side LangChain memory persists per mode — NOT cleared on switch.

        function switchMode(mode) {
            if (mode === currentMode && chatArea.children.length > 0) return;

            // Save current mode's chat UI to cache before switching
            modeChatCache[currentMode] = chatArea.innerHTML;

            // Switch to the new mode
            currentMode = mode;
            sessionId = modeSessions[mode];

            // Update active button
            modeButtons.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });

            // Fade transition
            chatArea.classList.add('fade-out');

            setTimeout(() => {
                // Restore cached chat UI for this mode, or show welcome message
                if (modeChatCache[mode]) {
                    chatArea.innerHTML = modeChatCache[mode];
                } else {
                    chatArea.innerHTML = '';
                    addJeffMessage(welcomeMessages[mode]);
                }
                chatArea.classList.remove('fade-out');
                scrollToBottom();
            }, 200);
        }

        // ── Close / Reopen ──────────────────────────────────────────────────
        // Close clears ALL modes' memory (server + client) — full reset.

        async function closeInterface() {
            // Clear ALL server-side LangChain sessions
            if (useBackend) {
                for (const sid of Object.values(modeSessions)) {
                    try {
                        await fetch(`${API_BASE_URL}/clear`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ session_id: sid })
                        });
                    } catch (e) { /* no-op */ }
                }
            }

            // Reset all session IDs and caches
            for (const mode of Object.keys(modeSessions)) {
                modeSessions[mode] = crypto.randomUUID();
                modeChatCache[mode] = null;
            }
            sessionId = modeSessions[currentMode];

            chatArea.innerHTML = '';
            closeOverlay.classList.add('visible');
        }

        function reopenInterface() {
            closeOverlay.classList.remove('visible');
            addJeffMessage(welcomeMessages[currentMode]);
            inputField.focus();
        }

        // ── Event Listeners ─────────────────────────────────────────────────

        // Mode buttons
        modeButtons.forEach(btn => {
            btn.addEventListener('click', () => switchMode(btn.dataset.mode));
        });

        // Send button
        sendBtn.addEventListener('click', sendMessage);

        // Enter key sends (without Shift)
        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Close button + ESC key
        closeBtn.addEventListener('click', closeInterface);
        reopenBtn.addEventListener('click', reopenInterface);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (closeOverlay.classList.contains('visible')) {
                    reopenInterface();
                } else {
                    closeInterface();
                }
            }
        });

        // ── Initialize ──────────────────────────────────────────────────────
        addJeffMessage(welcomeMessages[currentMode]);
        inputField.focus();
    </script>
</body>
</html>
